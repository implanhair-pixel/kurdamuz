# Netlify Configuration for KurdAmuz
# This configures Netlify Functions, scheduled jobs, and deployment settings

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  timeout = 60  # Netlify free plan limit for scheduled functions

[[plugins]]
  package = "@netlify/plugin-nextjs"
